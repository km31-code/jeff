# jeff release pipeline
# triggers on push to the `release` branch only.
# job order: test -> build -> sign -> notarize -> release
# all secrets are resolved from GitHub Actions secrets; no values are committed here.
#
# required secrets:
#   APPLE_CERTIFICATE          - base64-encoded .p12 developer id cert
#   APPLE_CERTIFICATE_PASSWORD - password for the .p12
#   APPLE_SIGNING_IDENTITY     - "Developer ID Application: ..."
#   APPLE_ID                   - apple id email for notarytool
#   APPLE_APP_PASSWORD         - app-specific password for notarytool
#   APPLE_TEAM_ID              - apple team id
#   APPLE_PROVIDER_SHORT_NAME  - provider short name, kept for Apple account clarity
#   TAURI_PUBLIC_KEY           - public updater key embedded into tauri.conf.json at build time
#   TAURI_PRIVATE_KEY          - private updater key, mapped to TAURI_SIGNING_PRIVATE_KEY
#   TAURI_KEY_PASSWORD         - updater private key password

name: release

on:
  push:
    branches:
      - release

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: install frontend dependencies
        run: npm --prefix desktop ci

      - name: cargo test
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml

      - name: phase 17 latency regression gate
        run: bash scripts/phase17_check.sh

      - name: frontend tests
        run: npm --prefix desktop test -- --run

  build:
    needs: test
    runs-on: macos-14
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: install frontend dependencies
        run: npm --prefix desktop ci

      - name: inject updater public key
        env:
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          config = Path("desktop/src-tauri/tauri.conf.json")
          text = config.read_text()
          public_key = os.environ["TAURI_PUBLIC_KEY"].strip()
          if not public_key:
              raise SystemExit("TAURI_PUBLIC_KEY is empty")
          config.write_text(text.replace("{{TAURI_PUBLIC_KEY}}", public_key))
          PY

      - name: build universal binary (universal-apple-darwin)
        run: npm --prefix desktop run tauri -- build --target universal-apple-darwin --bundles app --no-sign --ci

      - name: upload unsigned app bundle
        uses: actions/upload-artifact@v4
        with:
          name: jeff-unsigned
          path: desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          retention-days: 1

  sign:
    needs: build
    runs-on: macos-14
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download unsigned app bundle
        uses: actions/download-artifact@v4
        with:
          name: jeff-unsigned
          path: artifacts/

      - name: import developer id certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "" build.keychain
          rm -f certificate.p12

      - name: codesign app bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          APP=$(find artifacts -name "*.app" -type d | head -1)
          test -n "$APP"
          codesign --deep --force --options runtime \
            --entitlements desktop/src-tauri/entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" "$APP"
          codesign --verify --deep --strict "$APP"

      - name: create signed dmg
        run: |
          APP=$(find artifacts -name "*.app" -type d | head -1)
          hdiutil create -volname "Jeff" -srcfolder "$APP" \
            -ov -format UDZO Jeff_signed.dmg

      - name: upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jeff-signed
          path: |
            Jeff_signed.dmg
            artifacts/**/*.app
          retention-days: 1

  notarize:
    needs: sign
    runs-on: macos-14
    steps:
      - name: download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: jeff-signed
          path: artifacts/

      - name: notarize with apple notary api
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find artifacts -name "*.dmg" | head -1)
          test -n "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: staple notarization ticket
        run: |
          DMG=$(find artifacts -name "*.dmg" | head -1)
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: upload notarized artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jeff-notarized
          path: |
            artifacts/*.dmg
            artifacts/**/*.dmg
            artifacts/**/*.app
          retention-days: 7

  release:
    needs: notarize
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: install frontend dependencies
        run: npm --prefix desktop ci

      - name: download notarized artifacts
        uses: actions/download-artifact@v4
        with:
          name: jeff-notarized
          path: artifacts/

      - name: read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: create updater archive and latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP=$(find artifacts -name "*.app" -type d | head -1)
          DMG=$(find artifacts -name "*.dmg" | head -1)
          test -n "$APP"
          test -n "$DMG"

          UPDATER_ARCHIVE="Jeff_${VERSION}_universal.app.tar.gz"
          tar -czf "$UPDATER_ARCHIVE" -C "$(dirname "$APP")" "$(basename "$APP")"
          SIGN_OUTPUT=$(npm --prefix desktop run tauri -- signer sign "$UPDATER_ARCHIVE")
          SIG=$(printf '%s\n' "$SIGN_OUTPUT" | awk '/Public signature:/{getline; print}')
          test -n "$SIG"

          REPO_URL="https://github.com/$GITHUB_REPOSITORY"
          UPDATER_URL="$REPO_URL/releases/download/v$VERSION/$UPDATER_ARCHIVE"

          cat > latest.json <<JSON
          {
            "version": "$VERSION",
            "notes": "See https://github.com/$GITHUB_REPOSITORY/releases/tag/v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "$SIG",
                "url": "$UPDATER_URL"
              }
            }
          }
          JSON

      - name: create github release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG=$(find artifacts -name "*.dmg" | head -1)
          UPDATER_ARCHIVE="Jeff_${VERSION}_universal.app.tar.gz"
          gh release create "v$VERSION" \
            --title "Jeff v$VERSION" \
            --notes "Jeff v$VERSION release" \
            "$DMG" \
            "$UPDATER_ARCHIVE" \
            latest.json
